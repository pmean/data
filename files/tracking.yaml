description: >
  Results of a test of hand-eye coordination. This
  test used a rotating disk with a target spot.
  Subjects tried to maintain contact with the moving
  target using a metal wand. Outcome was the time
  spent in contact during a 15 second interval. Each
  subject repeated this task for four trials total.

